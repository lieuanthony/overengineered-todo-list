name: Terraform Apply

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    environment: production
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan
        env:
          TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_jwt_refresh_secret: ${{ secrets.JWT_REFRESH_SECRET }}
          TF_VAR_github_org: ${{ secrets.GH_ORG }}

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_jwt_refresh_secret: ${{ secrets.JWT_REFRESH_SECRET }}
          TF_VAR_github_org: ${{ secrets.GH_ORG }}

      - name: Upload state to S3
        run: |
          aws s3 cp terraform/terraform.tfstate s3://${{ secrets.TF_STATE_BUCKET }}/terraform.tfstate

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Wait for ingress LB hostname
        run: |
          echo "Waiting for load balancer hostname..."
          for i in $(seq 1 20); do
            LB_HOST=$(kubectl get ingress -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$LB_HOST" ]; then
              echo "LB hostname: $LB_HOST"
              echo "LB_HOST=$LB_HOST" >> $GITHUB_ENV
              break
            fi
            echo "Attempt $i/20 — not ready yet, waiting 30s..."
            sleep 30
          done
          if [ -z "$LB_HOST" ]; then
            echo "LB hostname not available after 10 minutes, skipping"
          fi

      - name: Update NEXT_PUBLIC_API_URL secret
        if: env.LB_HOST != ''
        run: |
          gh secret set NEXT_PUBLIC_API_URL --body "http://${{ env.LB_HOST }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Trigger deploy
        run: gh workflow run main.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}